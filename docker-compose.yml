version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nextvote-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextvote
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextvote-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nextvote?schema=public
      - PORT=3000
      - JWT_SECRET=supersecret_for_development_only
      - ENCRYPTION_KEY=12345678901234567890123456789012
      - NODE_ENV=development
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextvote-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: nextvote-bot
    restart: always
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-your_discord_bot_token_here}
      - API_URL=http://backend:3000/api
    depends_on:
      - backend

volumes:
  pgdata: